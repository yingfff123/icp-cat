<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ICP资产提取器</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <section class="header">
        <div>
          <h1>ICP资产提取</h1>
          <p>自动抓取备案查询响应中的域名 / IP</p>
        </div>
        <label class="switch">
          <input id="captureToggle" type="checkbox" />
          <span class="slider"></span>
        </label>
      </section>

      <section class="panel status-panel">
        <div class="meta-row">
          <span class="label">状态</span>
          <span id="statusText" class="status idle">未开启</span>
        </div>
        <div class="meta-row">
          <span class="label">接口总数</span>
          <span id="totalCount">-</span>
        </div>
        <div class="meta-row">
          <span class="label">已抓取</span>
          <span id="capturedCount">0</span>
        </div>
        <div class="meta-row">
          <span class="label">最近更新</span>
          <span id="updatedAt">-</span>
        </div>
      </section>

      <div class="tab-bar">
        <button class="tab active" data-tab="domains">域名 <span id="domainCount" class="badge">0</span></button>
        <button class="tab" data-tab="ips">IP <span id="ipCount" class="badge">0</span></button>
      </div>

      <section class="panel list-panel">
        <ul id="domainList" class="result-list" data-tab="domains">
          <li class="empty">开启监听后在备案页面发起查询</li>
        </ul>
        <ul id="ipList" class="result-list hidden" data-tab="ips">
          <li class="empty">暂无数据</li>
        </ul>
      </section>

      <section class="actions">
        <button id="copyButton" class="action-button copy">复制当前列表</button>
        <button id="clearButton" class="action-button danger">清空全部</button>
      </section>

      <p id="errorText" class="error-text"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
